<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora BDV Pro - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-dark { background-color: #11141d; border: 1px solid #1e293b; }
        .input-dark { background-color: #0b0e14; border: 1px solid #1e293b; color: white; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-5xl mx-auto px-4 py-6">
        <!-- Header con Stats -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tighter italic uppercase">Calculadora <span class="text-blue-500 font-extrabold text-2xl">BDV</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Panel de Control de Arbitraje</p>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="card-dark rounded-xl px-4 py-2 flex-1 md:flex-none text-right shadow-lg border-l-4 border-l-blue-500">
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Saldo Disponible</p>
                    <p id="statStock" class="text-lg font-bold mono text-blue-400">$0.00</p>
                </div>
                <div class="card-dark rounded-xl px-4 py-2 flex-1 md:flex-none text-right shadow-lg border-l-4 border-l-emerald-500">
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Ganancia Hoy</p>
                    <p id="statProfit" class="text-lg font-bold mono text-emerald-400">+$0.00</p>
                </div>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="flex gap-6 mb-6 border-b border-slate-800">
            <button onclick="setTab('zinli')" id="tabZinli" class="pb-3 text-xs font-bold uppercase tracking-widest transition-all tab-active">Zinli / Recargas</button>
            <button onclick="setTab('giftcard')" id="tabGift" class="pb-3 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-slate-300 transition-all">Gift Cards Amazon</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Columna Izquierda: Entradas -->
            <div class="lg:col-span-4 space-y-4">
                <div class="card-dark rounded-3xl p-5 shadow-2xl">
                    <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-3 bg-blue-500 rounded-full"></span> Nueva Operación
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Venta USDT (Binance)</label>
                            <input type="number" id="inUsdt" oninput="calc()" placeholder="0.00" class="w-full input-dark p-3 rounded-xl outline-none focus:border-blue-500 mono">
                        </div>
                        
                        <div class="space-y-1">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Tasa de Venta (P2P)</label>
                            <input type="number" id="inTasaV" oninput="calc()" placeholder="65.50" class="w-full input-dark p-3 rounded-xl outline-none focus:border-blue-500 mono">
                        </div>

                        <div class="space-y-1">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Tasa Compra BDV</label>
                            <input type="number" id="inTasaC" oninput="calc()" value="51.50" class="w-full input-dark p-3 rounded-xl outline-none focus:border-emerald-500 text-emerald-400 font-bold mono">
                        </div>

                        <div id="giftSelectorBox" class="hidden space-y-1 pt-2 border-t border-slate-800">
                            <label class="block text-[10px] font-bold text-purple-400 uppercase">Seleccionar Gift Card</label>
                            <select id="inGiftCard" onchange="calc()" class="w-full input-dark p-3 rounded-xl outline-none focus:border-purple-500 text-purple-300 mono text-[11px]"></select>
                        </div>

                        <div class="pt-4">
                            <button onclick="saveOp()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 uppercase text-[10px] tracking-widest">
                                Registrar Operación
                            </button>
                            <button onclick="resetStock()" class="w-full mt-2 text-[9px] text-slate-600 hover:text-red-400 uppercase font-bold transition-colors">Reiniciar Todo</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna Central: Resultados -->
            <div class="lg:col-span-4 space-y-4">
                <div class="card-dark rounded-3xl p-5 shadow-2xl h-full flex flex-col">
                    <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4">Análisis de Retorno</h2>
                    
                    <div id="desglose" class="space-y-2 text-[11px] mono flex-grow">
                        <!-- Se llena vía JS -->
                    </div>

                    <div class="mt-6 pt-6 border-t border-slate-800 space-y-3">
                        <div class="flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase">
                            <span>Neto en BDV:</span>
                            <span id="resBsNeto" class="text-white font-bold mono">0.00 Bs</span>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div class="text-left">
                                <p class="text-[9px] text-emerald-500 font-bold uppercase">Compras $</p>
                                <p id="resDolarComprado" class="text-xl font-bold text-emerald-400">$0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-orange-500 font-bold uppercase">Sobrante</p>
                                <p id="resSobrante" class="text-xl font-bold text-orange-400">0.00</p>
                            </div>
                        </div>

                        <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/30">
                            <p class="text-[9px] text-blue-400 font-bold uppercase">Neto Final Est.</p>
                            <div class="flex justify-between items-end">
                                <p id="resNetoFinal" class="text-2xl font-bold text-blue-300">$0.00</p>
                                <p id="resMargen" class="text-sm font-bold text-white mb-1">0.00</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Historial -->
            <div class="lg:col-span-4 space-y-4">
                <div class="card-dark rounded-3xl p-5 shadow-2xl h-[500px] flex flex-col">
                    <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4 flex justify-between items-center">
                        Historial del Día
                        <span id="histCount" class="bg-slate-800 px-2 py-0.5 rounded text-blue-400">0</span>
                    </h2>
                    
                    <div id="historyList" class="overflow-y-auto flex-grow space-y-2 pr-1">
                        <!-- Items del historial -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const giftCards = [
            { get: 1.1, cost: 1.31 }, { get: 3.1, cost: 3.70 }, { get: 5.1, cost: 6.10 },
            { get: 7.1, cost: 8.48 }, { get: 10.1, cost: 12.06 }, { get: 15.1, cost: 18.03 },
            { get: 20.1, cost: 24.00 }, { get: 25.1, cost: 29.97 }, { get: 30.1, cost: 35.94 },
            { get: 35.1, cost: 41.91 }, { get: 40.1, cost: 47.87 }, { get: 45.1, cost: 53.84 },
            { get: 50.1, cost: 59.82 }, { get: 55.1, cost: 65.79 }, { get: 60.1, cost: 71.76 },
            { get: 65.1, cost: 77.73 }, { get: 70.1, cost: 83.70 }, { get: 75.1, cost: 89.67 },
            { get: 80.1, cost: 95.63 }, { get: 85.1, cost: 101.60 }, { get: 90.1, cost: 107.58 },
            { get: 95.1, cost: 113.55 }, { get: 100.1, cost: 114.32 }, { get: 110.1, cost: 125.74 },
            { get: 120.1, cost: 137.16 }, { get: 130.1, cost: 148.58 }, { get: 140.1, cost: 160.00 },
            { get: 150.1, cost: 171.42 }, { get: 160.1, cost: 182.84 }, { get: 170.1, cost: 194.27 },
            { get: 180.1, cost: 205.69 }, { get: 190.1, cost: 217.11 }, { get: 200.1, cost: 228.53 }
        ];

        let currentTab = 'zinli';
        let state = {
            stock: parseFloat(localStorage.getItem('bdv_stock_v3')) || 0,
            history: JSON.parse(localStorage.getItem('bdv_history_v3')) || [],
            profit: 0
        };

        function init() {
            const sel = document.getElementById('inGiftCard');
            sel.innerHTML = giftCards.map(gc => `<option value="${gc.cost}" data-get="${gc.get}">Tarjeta $${gc.get.toFixed(1)} (Costo $${gc.cost.toFixed(2)})</option>`).join('');
            renderHistory();
            updateStats();
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tabZinli').className = `pb-3 text-xs font-bold uppercase tracking-widest transition-all ${tab === 'zinli' ? 'tab-active' : 'text-slate-500'}`;
            document.getElementById('tabGift').className = `pb-3 text-xs font-bold uppercase tracking-widest transition-all ${tab === 'giftcard' ? 'tab-active' : 'text-slate-500'}`;
            document.getElementById('giftSelectorBox').classList.toggle('hidden', tab !== 'giftcard');
            calc();
        }

        function calc() {
            const uVenta = parseFloat(document.getElementById('inUsdt').value) || 0;
            const tVenta = parseFloat(document.getElementById('inTasaV').value) || 0;
            const tCompra = parseFloat(document.getElementById('inTasaC').value) || 0;

            if (uVenta <= 0 || tVenta <= 0) {
                document.getElementById('desglose').innerHTML = '<p class="text-slate-600 italic">Esperando datos...</p>';
                return;
            }

            // Cálculos base de la venta
            const bsBrutos = uVenta * tVenta;
            const comiBinance = bsBrutos * 0.0002;
            const comiRetiro = bsBrutos * 0.005;
            const bsNetos = bsBrutos - comiBinance - comiRetiro;

            const usdComprados = Math.floor(bsNetos / tCompra);
            const sobranteBs = bsNetos % tCompra;

            let receivedUsd = 0;
            let htmlDesglose = "";

            if (currentTab === 'zinli') {
                const comiRecarga = usdComprados * 0.0375;
                const netoZinli = usdComprados - comiRecarga;
                const comiServicio = netoZinli * 0.025;
                // Estimación de retorno final tras brecha cambiaria
                receivedUsd = (netoZinli - comiServicio) * 0.94; 

                htmlDesglose = `
                    <div class="flex justify-between"><span>Bruto Venta:</span><span class="text-white">${bsBrutos.toFixed(2)} Bs</span></div>
                    <div class="flex justify-between text-red-400/80"><span>Comi. Binance:</span><span>-${comiBinance.toFixed(2)} Bs</span></div>
                    <div class="flex justify-between text-red-400/80"><span>Comi. Retiro:</span><span>-${comiRetiro.toFixed(2)} Bs</span></div>
                    <div class="flex justify-between border-t border-slate-800 pt-1 mt-1 font-bold"><span>En BDV:</span><span class="text-blue-400">${bsNetos.toFixed(2)} Bs</span></div>
                    <div class="flex justify-between mt-2"><span>Dólares BDV:</span><span class="text-emerald-400">$${usdComprados}</span></div>
                    <div class="flex justify-between text-red-400/80"><span>Costos Zinli:</span><span>-$${(comiRecarga + comiServicio).toFixed(2)}</span></div>
                `;
            } else {
                const sel = document.getElementById('inGiftCard');
                const cost = parseFloat(sel.value);
                const get = parseFloat(sel.options[sel.selectedIndex].dataset.get);
                receivedUsd = get;

                htmlDesglose = `
                    <div class="flex justify-between"><span>Neto en BDV:</span><span class="text-blue-400">${bsNetos.toFixed(2)} Bs</span></div>
                    <div class="flex justify-between"><span>Dólares Comprados:</span><span class="text-emerald-400">$${usdComprados}</span></div>
                    <div class="flex justify-between text-purple-400 mt-2"><span>Costo de Card:</span><span>$${cost.toFixed(2)}</span></div>
                    <div class="flex justify-between font-bold text-white border-t border-slate-800 pt-1"><span>Obtienes:</span><span>$${get.toFixed(2)}</span></div>
                `;
            }

            document.getElementById('desglose').innerHTML = htmlDesglose;
            document.getElementById('resBsNeto').innerText = bsNetos.toLocaleString('es-VE', {minimumFractionDigits: 2}) + " Bs";
            document.getElementById('resDolarComprado').innerText = "$" + usdComprados;
            document.getElementById('resSobrante').innerText = sobranteBs.toFixed(2);
            document.getElementById('resNetoFinal').innerText = "$" + receivedUsd.toFixed(2);
            
            const profit = receivedUsd - uVenta;
            const mLabel = document.getElementById('resMargen');
            mLabel.innerText = (profit >= 0 ? "+" : "") + profit.toFixed(3);
            mLabel.className = `text-sm font-bold mono ${profit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
        }

        function saveOp() {
            const uV = parseFloat(document.getElementById('inUsdt').value) || 0;
            const tV = parseFloat(document.getElementById('inTasaV').value) || 0;
            const tC = parseFloat(document.getElementById('inTasaC').value) || 0;
            
            if(!uV || !tV) return;

            // Cálculos finales para el historial
            const bsNetos = (uV * tV) * 0.9998 * 0.995;
            const usdComprados = Math.floor(bsNetos / tC);
            
            let finalUsd = 0;
            let type = currentTab === 'zinli' ? 'Recarga' : 'GiftCard';
            let costUsd = 0;

            if (currentTab === 'zinli') {
                finalUsd = (usdComprados * 0.9625 * 0.975) * 0.94;
                state.stock += usdComprados;
            } else {
                const sel = document.getElementById('inGiftCard');
                costUsd = parseFloat(sel.value);
                finalUsd = parseFloat(sel.options[sel.selectedIndex].dataset.get);
                
                // Descontar del stock si hay suficiente, si no avisar
                if(state.stock < costUsd) {
                    if(!confirm(`No tienes suficiente Stock ($${state.stock.toFixed(2)}) para esta Gift Card ($${costUsd.toFixed(2)}). ¿Registrar de todas formas?`)) return;
                }
                state.stock -= costUsd;
            }

            const opProfit = finalUsd - uV;

            const newOp = {
                id: Date.now(),
                type,
                in: uV,
                out: finalUsd,
                profit: opProfit,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            state.history.unshift(newOp);
            saveToLocal();
            renderHistory();
            updateStats();
            
            // Feedback
            document.getElementById('inUsdt').value = "";
            calc();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const count = document.getElementById('histCount');
            count.innerText = state.history.length;

            if(state.history.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-600 text-[11px] uppercase font-bold tracking-widest">Sin registros hoy</div>';
                return;
            }

            list.innerHTML = state.history.map(op => `
                <div class="bg-slate-900/40 p-3 rounded-2xl border border-slate-800/50 flex justify-between items-center group">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-bold uppercase ${op.type === 'Recarga' ? 'text-blue-500' : 'text-purple-500'}">${op.type}</span>
                            <span class="text-[9px] text-slate-600 mono">${op.time}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-300">$${op.in} <span class="text-slate-600">→</span> $${op.out.toFixed(2)}</p>
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">Profit</p>
                            <p class="text-xs font-bold mono ${op.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}">${op.profit >= 0 ? '+' : ''}${op.profit.toFixed(2)}</p>
                        </div>
                        <button onclick="deleteOp(${op.id})" class="opacity-0 group-hover:opacity-100 p-2 text-slate-700 hover:text-red-500 transition-all">
                            ×
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('statStock').innerText = `$${state.stock.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const totalProfit = state.history.reduce((acc, curr) => acc + curr.profit, 0);
            const pEl = document.getElementById('statProfit');
            pEl.innerText = `${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}`;
            pEl.className = `text-lg font-bold mono ${totalProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
        }

        function deleteOp(id) {
            state.history = state.history.filter(o => o.id !== id);
            saveToLocal();
            renderHistory();
            updateStats();
        }

        function resetStock() {
            if(confirm("¿Estás seguro de reiniciar el stock y el historial?")) {
                state.stock = 0;
                state.history = [];
                saveToLocal();
                renderHistory();
                updateStats();
            }
        }

        function saveToLocal() {
            localStorage.setItem('bdv_stock_v3', state.stock);
            localStorage.setItem('bdv_history_v3', JSON.stringify(state.history));
        }

        init();
    </script>
</body>
</html>
